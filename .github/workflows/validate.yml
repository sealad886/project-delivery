name: Validate plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate plugin structure
        run: python3 scripts/check_plugin.py .

      - name: Validate route contracts
        run: python3 scripts/check_routes.py .

      - name: Simulate marketplace mirror
        run: python3 scripts/check_marketplace_bundle.py .

      - name: Run validator regression tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v
