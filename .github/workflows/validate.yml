name: Validate plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate plugin structure
        run: python3 scripts/check_plugin.py .

      - name: Validate route contracts
        run: python3 scripts/check_routes.py .

      - name: Validate installable distribution bundle
        run: python3 scripts/check_distribution_bundle.py .

      - name: Run validator regression tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v
