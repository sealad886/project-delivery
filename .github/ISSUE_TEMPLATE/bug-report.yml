name: Bug report
description: Report incorrect routing, broken references, unsafe guidance, or validation defects
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Project Delivery. Do not include secrets, personal data, or private repository content.
  - type: input
    id: version
    attributes:
      label: Project Delivery version
      description: Include the manifest version and installed plugin/cache identity when available.
      placeholder: 1.3.0+codex.example
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Delivery routing
        - Skill instructions
        - Shared operating model or templates
        - Validation or distribution packaging
        - Installation or presentation
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe the route, artifact, authority boundary, or validation result you expected.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and evidence
      description: Include a minimal prompt, exact result, relevant paths, and commands or receipts when safe.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment and limitations
      description: Codex surface, repository type, revision, instructions, and checks not run.
